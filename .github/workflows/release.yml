name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'ubuntu-22.04' && 'x86_64-unknown-linux-gnu' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Tauri bundler tools (NSIS/WiX)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri\WixTools
            ~\AppData\Local\tauri\NSIS
          key: tauri-bundler-${{ runner.os }}-nsis3.11-wix3141

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'JadeKit ${{ github.ref_name }}'
          releaseBody: |
            ## JadeKit ${{ github.ref_name }}
            
            AI 工作流与个人效率工具箱
            
            ### 下载说明
            - **Windows**: 下载 `.exe` (NSIS安装包) 或 `.msi` 
            - **macOS**: 下载 `.dmg`
            - **Linux**: 下载 `.deb` 或 `.AppImage`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
